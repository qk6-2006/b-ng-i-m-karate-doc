<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KARATE SCOREBOARD - ONE ROW UPDATED</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1e1e1e; --aka: #c00000; --ao: #0070c0; --yellow: #ffff00; --red: #ff0000; }
        body { background-color: var(--bg); color: white; font-family: Arial, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        
        /* Layout Aka - Ao */
        .score-container { display: flex; flex: 1.4; border-bottom: 3px solid #000; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .aka { background-color: var(--aka); }
        .ao { background-color: var(--ao); }
        
        .name-header { font-size: 2rem; font-weight: bold; margin-bottom: 5px; opacity: 0.9; }
        .score-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .score-val { font-size: 9rem; font-weight: bold; line-height: 1; font-family: 'Share Tech Mono', monospace; }
        
        /* Senshu circle */
        .senshu { width: 35px; height: 35px; border: 3px solid white; border-radius: 50%; cursor: pointer; transition: 0.2s; }
        .senshu.active { background-color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 15px var(--yellow); }
        
        /* Hàng nút điểm +1+2+3-1 trên cùng 1 hàng */
        .btn-points-row { display: flex; justify-content: center; gap: 8px; margin-bottom: 12px; width: 100%; }
        .btn-plus { flex: 0 1 55px; height: 45px; font-size: 1.2rem; border-radius: 6px; background: #fff; color: #333; border: none; font-weight: bold; cursor: pointer; box-shadow: 0 3px 0 #bbb; }
        .btn-plus:active { transform: translateY(2px); box-shadow: none; }
        
        /* Hàng lỗi C1...H */
        .penalty-row { display: flex; justify-content: center; gap: 5px; width: 100%; }
        .penalty { flex: 1; max-width: 45px; height: 40px; border: 1px solid white; background: none; color: white; border-radius: 4px; font-size: 0.9rem; font-weight: bold; cursor: pointer; }
        .penalty.active { background-color: var(--yellow); color: black; border-color: var(--yellow); }
        
        /* Timer Section */
        .timer-section { flex: 1; background-color: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .timer-display { display: flex; align-items: center; font-family: 'Share Tech Mono', monospace; }
        .t-input { background: transparent; border: none; color: inherit; font-family: inherit; font-size: 8rem; font-weight: bold; width: 2ch; text-align: center; outline: none; }
        .dots { font-size: 6rem; padding-bottom: 10px; }
        .time-sub { font-size: 3.5rem; display: none; }
        
        .yellow { color: var(--yellow); }
        .red { color: var(--red); }
        
        .controls { display: flex; gap: 15px; margin-top: 10px; align-items: center; }
        .btn-timer { padding: 15px 25px; border-radius: 8px; color: white; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-start { background-color: #4CAF50; }
        .btn-stop { background-color: #f44336; }
        .btn-reset { background: #555; }
        
        /* Icon đồng hồ đỏ */
        .btn-icon { background-color: #c00000; color: white; font-size: 1.8rem; width: 55px; height: 55px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: none; cursor: pointer; }

        /* Overlay nghỉ */
        #overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; flex-direction: column; justify-content: center; align-items: center; }
        .ov-timer { font-family: 'Share Tech Mono', monospace; font-size: 12rem; color: var(--yellow); }
    </style>
</head>
<body onclick="initAudio()">

    <div class="score-container">
        <div class="side aka">
            <div class="name-header">AKA</div>
            <div class="score-row">
                <div class="score-val" id="scoreAka">0</div>
                <div class="senshu" id="senshuAka" onclick="toggleSenshu('Aka')"></div>
            </div>
            <div class="btn-points-row">
                <button class="btn-plus" onclick="changeScore('scoreAka', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>

        <div class="side ao">
            <div class="name-header">AO</div>
            <div class="score-row">
                <div class="senshu" id="senshuAo" onclick="toggleSenshu('Ao')"></div>
                <div class="score-val" id="scoreAo">0</div>
            </div>
            <div class="btn-points-row">
                <button class="btn-plus" onclick="changeScore('scoreAo', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-display">
            <input type="text" id="min-in" class="t-input yellow" value="03" maxlength="2" onblur="sync()">
            <span class="dots yellow" id="dots">:</span>
            <input type="text" id="sec-in" class="t-input yellow" value="00" maxlength="2" onblur="sync()">
            <span id="sub" class="time-sub red">.00</span>
        </div>
        <div class="controls">
            <button class="btn-timer btn-start" onclick="start()">START</button>
            <button class="btn-timer btn-stop" onclick="stop()">STOP</button>
            <button class="btn-timer btn-reset" onclick="resetAll()">RESET</button>
            <button class="btn-icon" onclick="openOverlay()">⏱</button>
        </div>
    </div>

    <div id="overlay">
        <div id="ov-time" class="ov-timer">01:00</div>
        <div class="controls">
            <button class="btn-timer btn-start" onclick="startOV()">START</button>
            <button class="btn-timer btn-stop" onclick="stopOV()">STOP</button>
            <button class="btn-timer btn-reset" onclick="closeOverlay()">ĐÓNG</button>
        </div>
    </div>

<script>
    let timeLeft = 180980; 
    let timerId = null, audioCtx = null;
    let ovTimeLeft = 60980, ovTimerId = null;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function changeScore(id, val) {
        let el = document.getElementById(id);
        el.innerText = Math.max(0, parseInt(el.innerText) + val);
    }
    
    function toggleSenshu(side) {
        const t = document.getElementById('senshu' + side);
        const o = side === 'Aka' ? document.getElementById('senshuAo') : document.getElementById('senshuAka');
        t.classList.toggle('active'); if(t.classList.contains('active')) o.classList.remove('active');
    }

    function sync() {
        let m = parseInt(document.getElementById('min-in').value) || 0;
        let s = parseInt(document.getElementById('sec-in').value) || 0;
        timeLeft = (m * 60 + s) * 1000 + 980;
        updateUI();
    }

    function updateUI() {
        const minI = document.getElementById('min-in'), secI = document.getElementById('sec-in');
        const dots = document.getElementById('dots'), sub = document.getElementById('sub');
        if (timeLeft >= 16000) {
            let ds = Math.floor((timeLeft - 1) / 1000); 
            minI.value = Math.floor(ds / 60).toString().padStart(2, '0');
            secI.value = (ds % 60).toString().padStart(2, '0');
            minI.className = secI.className = dots.className = "t-input yellow";
            sub.style.display = "none";
        } else {
            let s = Math.floor(timeLeft / 1000), ms = Math.floor((timeLeft % 1000) / 10);
            minI.value = "00"; secI.value = s.toString().padStart(2, '0');
            sub.innerText = "." + ms.toString().padStart(2, '0');
            minI.className = secI.className = dots.className = "t-input red";
            sub.style.display = "inline";
        }
    }

    function start() {
        if (timerId || timeLeft <= 0) return;
        initAudio();
        let last = Date.now();
        timerId = setInterval(() => {
            let delta = Date.now() - last;
            last = Date.now();
            let old = timeLeft;
            timeLeft -= delta;
            if (old >= 16000 && timeLeft < 16000) ring(1000);
            if (timeLeft <= 0) { timeLeft = 0; stop(); updateUI(); ring(2000); }
            else updateUI();
        }, 20);
    }

    function stop() { clearInterval(timerId); timerId = null; }
    
    function resetAll() { location.reload(); }

    function ring(d) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(), g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 450;
        o.connect(g); g.connect(audioCtx.destination);
        o.start(); setTimeout(() => o.stop(), d);
    }

    function openOverlay() {
        stop();
        document.getElementById('overlay').style.display = 'flex';
        ovTimeLeft = 60980; updateUIOV();
    }

    function closeOverlay() { stopOV(); document.getElementById('overlay').style.display = 'none'; }

    function startOV() {
        if (ovTimerId || ovTimeLeft <= 0) return;
        let last = Date.now();
        ovTimerId = setInterval(() => {
            let delta = Date.now() - last;
            last = Date.now();
            ovTimeLeft -= delta;
            if (ovTimeLeft <= 0) { ovTimeLeft = 0; stopOV(); ring(2000); }
            updateUIOV();
        }, 20);
    }

    function stopOV() { clearInterval(ovTimerId); ovTimerId = null; }

    function updateUIOV() {
        let ts = Math.max(0, Math.floor((ovTimeLeft - 1) / 1000));
        let m = Math.floor(ts / 60).toString().padStart(2, '0');
        let s = (ts % 60).toString().padStart(2, '0');
        document.getElementById('ov-time').innerText = m + ":" + s;
        document.getElementById('ov-time').style.color = ts < 10 ? 'var(--red)' : 'var(--yellow)';
    }

    updateUI();
</script>
</body>
</html>
