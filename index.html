<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARATE SCOREBOARD FIX</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #1e1e1e; 
            --aka: #c00000; 
            --ao: #0070c0; 
            --yellow: #ffff00; 
            --red: #ff0000;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: system-ui, sans-serif; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden;
            user-select: none; 
        }

        /* Container Aka/Ao */
        .score-container { 
            display: flex; 
            flex-direction: column; 
            flex: 1; 
            gap: 8px; 
            padding: 8px;
        }

        .side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-evenly; 
            border-radius: 20px; 
            padding: 5px;
        }
        .aka { background-color: var(--aka); }
        .ao { background-color: var(--ao); }

        .name-label { font-size: 1.5rem; font-weight: bold; }

        .score-row { display: flex; align-items: center; gap: 20px; }
        .score-val { 
            font-size: 6.5rem; 
            font-weight: bold; 
            font-family: 'Share Tech Mono', monospace; 
            line-height: 1;
        }
        
        .senshu { width: 40px; height: 40px; border: 3px solid white; border-radius: 50%; }
        .senshu.active { background-color: var(--yellow); border-color: var(--yellow); }

        .btn-group { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; width: 95%; }
        .btn-plus { padding: 12px 0; font-size: 1.2rem; border-radius: 10px; background: white; color: black; border: none; font-weight: bold; }

        .penalty-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; width: 95%; }
        .penalty { height: 40px; border: 1.5px solid white; background: none; color: white; border-radius: 6px; font-size: 0.9rem; font-weight: bold; }
        .penalty.active { background-color: var(--yellow); color: black; border-color: var(--yellow); }

        /* --- SỬA LỖI HIỂN THỊ TIMER TẠI ĐÂY --- */
        .timer-section { 
            background-color: #000; 
            padding: 10px 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .timer-display { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            font-family: 'Share Tech Mono', monospace; 
            color: var(--yellow);
            /* Đảm bảo không bị cắt chữ */
            height: 120px; 
            overflow: visible;
        }

        .t-num { 
            font-size: 8rem; 
            font-weight: bold; 
            line-height: 1;
            padding: 0 5px;
            min-width: 1.2ch;
            text-align: center;
        }

        .dots { font-size: 6rem; line-height: 1; margin-bottom: 10px; }
        .time-sub { font-size: 3rem; margin-left: 5px; color: var(--red); display: none; }

        /* Controls */
        .controls { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr 0.6fr; gap: 5px; width: 98%; margin-top: 10px; }
        .btn-ctrl { padding: 15px 0; border-radius: 10px; color: white; font-weight: bold; border: none; font-size: 0.9rem; }
        .btn-start { background-color: #70ad47; }
        .btn-stop { background-color: #c00000; }
        .btn-gray { background-color: #555; }

        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 2000; flex-direction: column; justify-content: center; align-items: center;
        }

        .yellow-text { color: var(--yellow); }
        .red-text { color: var(--red); }

        button:active { opacity: 0.8; transform: scale(0.96); }
    </style>
</head>
<body onclick="initAudio()">

    <div class="score-container">
        <div class="side aka">
            <div class="name-label">AKA</div>
            <div class="score-row">
                <div class="score-val" id="scoreAka">0</div>
                <div class="senshu" id="senshuAka" onclick="toggleSenshu('Aka')"></div>
            </div>
            <div class="btn-group">
                <button class="btn-plus" onclick="changeScore('scoreAka', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>

        <div class="side ao">
            <div class="name-label">AO</div>
            <div class="score-row">
                <div class="senshu" id="senshuAo" onclick="toggleSenshu('Ao')"></div>
                <div class="score-val" id="scoreAo">0</div>
            </div>
            <div class="btn-group">
                <button class="btn-plus" onclick="changeScore('scoreAo', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-display" id="t-display">
            <div class="t-num" id="m-disp" onclick="editTime()">03</div>
            <div class="dots">:</div>
            <div class="t-num" id="s-disp" onclick="editTime()">00</div>
            <div id="sub" class="time-sub">.00</div>
        </div>
        
        <div class="controls">
            <button class="btn-ctrl btn-start" onclick="start()">START</button>
            <button class="btn-ctrl btn-stop" onclick="stop()">STOP</button>
            <button class="btn-ctrl btn-gray" onclick="togglePreset()">3:00▾</button>
            <button class="btn-ctrl btn-gray" onclick="location.reload()">RESET</button>
            <button class="btn-ctrl btn-stop" onclick="openOverlay()">🕒</button>
        </div>
    </div>

    <div id="overlay">
        <div id="ov-time" style="font-family:'Share Tech Mono'; font-size:12rem; color:var(--yellow)">01:00</div>
        <div style="display:flex; gap:10px; width:90%; margin-top:20px">
            <button class="btn-ctrl btn-start" style="flex:1" onclick="startOV()">START</button>
            <button class="btn-ctrl btn-stop" style="flex:1" onclick="stopOV()">STOP</button>
            <button class="btn-ctrl btn-gray" style="flex:1" onclick="closeOverlay()">ĐÓNG</button>
        </div>
    </div>

<script>
    let timeLeft = 180980, timerId = null, audioCtx = null, played15s = false;
    let ovTimeLeft = 60980, ovTimerId = null;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    
    function changeScore(id, val) { 
        let el = document.getElementById(id); 
        el.innerText = Math.max(0, parseInt(el.innerText) + val); 
    }

    function toggleSenshu(side) {
        document.getElementById('senshuAka').classList.toggle('active', side === 'Aka');
        document.getElementById('senshuAo').classList.toggle('active', side === 'Ao');
    }

    function editTime() {
        let m = prompt("Nhập số phút:", "03");
        let s = prompt("Nhập số giây:", "00");
        if(m !== null && s !== null) {
            timeLeft = (parseInt(m) * 60 + parseInt(s)) * 1000 + 980;
            updateUI();
        }
    }

    function updateUI() {
        const mDisp = document.getElementById('m-disp');
        const sDisp = document.getElementById('s-disp');
        const tDisp = document.getElementById('t-display');
        const sub = document.getElementById('sub');

        if (timeLeft >= 16000) {
            let totalSec = Math.floor((timeLeft - 1) / 1000);
            mDisp.innerText = Math.floor(totalSec / 60).toString().padStart(2, '0');
            sDisp.innerText = (totalSec % 60).toString().padStart(2, '0');
            tDisp.className = "timer-display yellow-text";
            sub.style.display = "none";
        } else {
            let s = Math.floor(timeLeft / 1000);
            let ms = Math.floor((timeLeft % 1000) / 10);
            mDisp.innerText = "00";
            sDisp.innerText = s.toString().padStart(2, '0');
            sub.innerText = "." + ms.toString().padStart(2, '0');
            tDisp.className = "timer-display red-text";
            sub.style.display = "block";
        }
    }

    function start() {
        if (timerId || timeLeft <= 0) return;
        initAudio(); let last = Date.now();
        timerId = setInterval(() => {
            let delta = Date.now() - last; last = Date.now();
            let old = timeLeft; timeLeft -= delta;
            if (old >= 16000 && timeLeft < 16000 && !played15s) { ring(1000); played15s = true; }
            if (timeLeft <= 0) { timeLeft = 0; stop(); updateUI(); ring(2000); } else updateUI();
        }, 20);
    }

    function stop() { clearInterval(timerId); timerId = null; }

    function ring(d) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 450; o.connect(g); g.connect(audioCtx.destination);
        o.start(); setTimeout(() => o.stop(), d);
    }

    function togglePreset() {
        const p = [180, 120, 60, 30];
        let cur = Math.floor(timeLeft / 1000);
        let next = p[(p.indexOf(cur === 0 ? 180 : cur) + 1) % p.length];
        timeLeft = (next * 1000) + 980;
        event.target.innerText = Math.floor(next/60) + ":" + (next%60||"00") + "▾";
        updateUI();
    }

    // Overlay logic
    function openOverlay() { stop(); document.getElementById('overlay').style.display = 'flex'; ovTimeLeft = 60980; updateUIOV(); }
    function closeOverlay() { stopOV(); document.getElementById('overlay').style.display = 'none'; }
    function startOV() {
        if (ovTimerId || ovTimeLeft <= 0) return;
        initAudio(); let last = Date.now();
        ovTimerId = setInterval(() => {
            let delta = Date.now() - last; last = Date.now();
            ovTimeLeft -= delta; if (ovTimeLeft <= 0) { ovTimeLeft = 0; stopOV(); ring(2000); }
            updateUIOV();
        }, 20);
    }
    function stopOV() { clearInterval(ovTimerId); ovTimerId = null; }
    function updateUIOV() {
        let s = Math.max(0, Math.floor((ovTimeLeft - 1) / 1000));
        document.getElementById('ov-time').innerText = "00:" + s.toString().padStart(2, '0');
    }
</script>
</body>
</html>
