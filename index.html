<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARATE SCOREBOARD - FIXED LAYOUT</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #1a1a1a; --aka: #d32f2f; --ao: #1976d2; --yellow: #ffeb3b; }
        * { box-sizing: border-box; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); color: white; font-family: 'Arial', sans-serif; 
            margin: 0; padding: 0; display: flex; flex-direction: column; 
            height: 100vh; width: 100vw; overflow: hidden;
        }

        /* Vùng hiển thị điểm 2 bên */
        .players-section { display: flex; flex: 1.8; overflow: hidden; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: space-evenly; padding: 10px 5px; }
        .aka { background-color: var(--aka); }
        .ao { background-color: var(--ao); }

        .name-label { font-size: 1.4rem; font-weight: bold; }
        
        /* Điểm số và Senshu - Căn giữa tuyệt đối */
        .score-box { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        .score-val { font-family: 'Share Tech Mono', monospace; font-size: clamp(6rem, 25vh, 10rem); line-height: 1; font-weight: bold; text-align: center; width: 100%; }
        .senshu { 
            position: absolute; right: 10%; width: clamp(20px, 6vh, 35px); height: clamp(20px, 6vh, 35px); 
            border: 3px solid white; border-radius: 50%; z-index: 10;
        }
        .ao .senshu { left: 10%; right: auto; }
        .senshu.active { background-color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

        /* Nút điểm số - Dùng Grid để không bị lệch */
        .btn-row { display: grid; grid-template-columns: repeat(2, 1fr); gap: 6px; width: 90%; max-width: 140px; }
        .btn-p { height: 45px; background: white; color: black; border: none; border-radius: 6px; font-weight: bold; font-size: 1.2rem; }
        
        /* Lỗi C1-H bị nhảy hàng: Dùng Grid 3-2 để tối ưu diện tích */
        .penalty-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; width: 95%; max-width: 160px; margin-top: 5px; }
        .btn-c { height: 32px; border: 1px solid white; background: rgba(0,0,0,0.3); color: white; border-radius: 4px; font-size: 0.8rem; font-weight: bold; }
        .btn-c.active { background: var(--yellow); color: black; border-color: var(--yellow); }

        /* Phần Đồng hồ phía dưới */
        .timer-section { flex: 1; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding-bottom: env(safe-area-inset-bottom); }
        .timer-display { font-family: 'Share Tech Mono', monospace; font-size: clamp(5rem, 15vh, 7rem); color: var(--yellow); line-height: 1; margin-bottom: 10px; }

        /* Sửa lỗi icon đồng hồ bị lệch hàng: Đưa vào Flexbox chặt chẽ */
        .controls { display: flex; align-items: center; justify-content: center; gap: 8px; width: 95%; }
        .btn-ctrl { flex: 1; height: 50px; border-radius: 8px; border: none; font-weight: bold; font-size: 0.9rem; color: white; text-transform: uppercase; max-width: 90px; }
        .start { background: #4caf50; }
        .stop { background: #f44336; }
        .reset { background: #555; }
        
        /* Nút icon đồng hồ - Fix kích thước cố định để nằm cùng hàng */
        .btn-clock { width: 50px; height: 50px; background: #d32f2f; border-radius: 8px; display: flex; align-items: center; justify-content: center; border: none; padding: 0; }
        .btn-clock span { font-size: 24px; }
    </style>
</head>
<body onclick="setupAudio()">

    <div class="players-section">
        <div class="side aka">
            <div class="name-label">AKA</div>
            <div class="score-box">
                <div class="score-val" id="ptsAka">0</div>
                <div class="senshu" id="sAka" onclick="toggleS('Aka')"></div>
            </div>
            <div class="btn-row">
                <button class="btn-p" onclick="add('ptsAka',1)">+1</button>
                <button class="btn-p" onclick="add('ptsAka',2)">+2</button>
                <button class="btn-p" onclick="add('ptsAka',3)">+3</button>
                <button class="btn-p" onclick="add('ptsAka',-1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="btn-c" onclick="this.classList.toggle('active')">C1</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">C2</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">C3</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">HC</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>

        <div class="side ao">
            <div class="name-label">AO</div>
            <div class="score-box">
                <div class="senshu" id="sAo" onclick="toggleS('Ao')"></div>
                <div class="score-val" id="ptsAo">0</div>
            </div>
            <div class="btn-row">
                <button class="btn-p" onclick="add('ptsAo',1)">+1</button>
                <button class="btn-p" onclick="add('ptsAo',2)">+2</button>
                <button class="btn-p" onclick="add('ptsAo',3)">+3</button>
                <button class="btn-p" onclick="add('ptsAo',-1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="btn-c" onclick="this.classList.toggle('active')">C1</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">C2</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">C3</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">HC</button>
                <button class="btn-c" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-display" id="disp">03:00</div>
        <div class="controls">
            <button class="btn-ctrl start" onclick="start()">START</button>
            <button class="btn-ctrl stop" onclick="stop()">STOP</button>
            <button class="btn-ctrl reset" onclick="location.reload()">RESET</button>
            <button class="btn-clock" onclick="alert('Tính năng nghỉ sắp ra mắt!')"><span>⏱</span></button>
        </div>
    </div>

<script>
    let time = 180000, timerId = null, audioCtx = null;
    function setupAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function add(id, v) { let e = document.getElementById(id); e.innerText = Math.max(0, parseInt(e.innerText) + v); }
    function toggleS(s) { 
        document.getElementById('sAka').classList.remove('active'); 
        document.getElementById('sAo').classList.remove('active'); 
        document.getElementById('s' + s).classList.add('active'); 
    }
    function update() {
        let s = Math.ceil(time/1000);
        document.getElementById('disp').innerText = `${Math.floor(s/60).toString().padStart(2,'0')}:${(s%60).toString().padStart(2,'0')}`;
    }
    function start() {
        if(timerId || time <= 0) return;
        let last = Date.now();
        timerId = setInterval(() => {
            time -= (Date.now() - last); last = Date.now();
            if(time <= 0) { time = 0; stop(); }
            update();
        }, 100);
    }
    function stop() { clearInterval(timerId); timerId = null; }
</script>
</body>
</html>
