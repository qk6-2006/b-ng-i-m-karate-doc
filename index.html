<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KARATE SCOREBOARD</title>
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        :root { 
            --bg: #121212; 
            --aka: #c00000; 
            --ao: #0070c0; 
            --yellow: #ffff00; 
            --red: #ff0000;
        }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: system-ui, -apple-system, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
            user-select: none; 
        }

        /* Container chính cho AKA & AO */
        .score-container { 
            display: flex; 
            flex: 1.5; /* Chiếm nhiều không gian hơn timer */
            gap: 5px;
            padding: 5px;
        }

        .side { 
            flex: 1; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: space-between; 
            border-radius: 25px; 
            padding: 10px 5px;
            position: relative;
        }

        .aka { background-color: var(--aka); }
        .ao { background-color: var(--ao); }

        .name-label { font-size: 1.8rem; font-weight: bold; margin-top: 5px; }

        /* Điểm số & Senshu */
        .score-row { 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            width: 100%; 
            position: relative;
        }
        .score-val { 
            font-size: 7rem; 
            font-weight: bold; 
            line-height: 1; 
            font-family: 'Share Tech Mono', monospace; 
        }
        
        .senshu { 
            width: 35px; 
            height: 35px; 
            border: 3px solid white; 
            border-radius: 50%; 
            margin-left: 10px;
        }
        .senshu.active { background-color: var(--yellow); border-color: var(--yellow); box-shadow: 0 0 10px var(--yellow); }

        /* Grid cho các nút bấm điểm */
        .btn-group { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 4px; 
            width: 95%; 
        }
        .btn-plus { 
            padding: 12px 0; 
            font-size: 1.1rem; 
            border-radius: 8px; 
            background: #fff; 
            color: #000; 
            border: none; 
            font-weight: bold;
        }

        /* Grid cho các nút hình phạt */
        .penalty-row { 
            display: grid; 
            grid-template-columns: repeat(5, 1fr); 
            gap: 3px; 
            width: 95%; 
        }
        .penalty { 
            height: 40px; 
            border: 1.5px solid white; 
            background: none; 
            color: white; 
            border-radius: 6px; 
            font-size: 0.8rem; 
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .penalty.active { background-color: var(--yellow); color: black; border-color: var(--yellow); }

        /* Timer Section */
        .timer-section { 
            flex: 1;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            background: #000;
        }
        .timer-display { display: flex; align-items: center; font-family: 'Share Tech Mono', monospace; line-height: 1; }
        .t-input { 
            background: transparent; border: none; color: inherit; 
            font-family: inherit; font-size: 6rem; font-weight: bold; 
            width: 2ch; text-align: center; outline: none; 
        }
        .dots { font-size: 4rem; padding-bottom: 10px; }
        .time-sub { font-size: 2.5rem; display: none; }

        .yellow { color: var(--yellow); }
        .red { color: var(--red); }

        /* Bottom Controls */
        .controls { 
            display: grid;
            grid-template-columns: 1.2fr 1fr 1fr 1.2fr 0.6fr;
            gap: 5px; 
            width: 98%; 
            padding-bottom: 10px;
        }
        .btn-ctrl { 
            padding: 12px 0; border-radius: 10px; color: white; font-weight: bold; border: none; font-size: 0.85rem;
        }
        .btn-start { background-color: #70ad47; }
        .btn-stop { background-color: #c00000; }
        .btn-gray { background-color: #555; }

        /* Overlay */
        #overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 2000; flex-direction: column;
            justify-content: center; align-items: center;
        }

        button:active { opacity: 0.7; transform: scale(0.95); }
    </style>
</head>
<body onclick="initAudio()">

    <div class="score-container">
        <div class="side aka">
            <div class="name-label">AKA</div>
            <div class="score-row">
                <div class="score-val" id="scoreAka">0</div>
                <div class="senshu" id="senshuAka" onclick="toggleSenshu('Aka')"></div>
            </div>
            <div class="btn-group">
                <button class="btn-plus" onclick="changeScore('scoreAka', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAka', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>

        <div class="side ao">
            <div class="name-label">AO</div>
            <div class="score-row">
                <div class="score-val" id="scoreAo">0</div>
                <div class="senshu" id="senshuAo" onclick="toggleSenshu('Ao')"></div>
            </div>
            <div class="btn-group">
                <button class="btn-plus" onclick="changeScore('scoreAo', 1)">+1</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 2)">+2</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', 3)">+3</button>
                <button class="btn-plus" onclick="changeScore('scoreAo', -1)">-1</button>
            </div>
            <div class="penalty-row">
                <button class="penalty" onclick="this.classList.toggle('active')">C1</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C2</button>
                <button class="penalty" onclick="this.classList.toggle('active')">C3</button>
                <button class="penalty" onclick="this.classList.toggle('active')">HC</button>
                <button class="penalty" onclick="this.classList.toggle('active')">H</button>
            </div>
        </div>
    </div>

    <div class="timer-section">
        <div class="timer-display">
            <input type="text" id="min-in" class="t-input yellow" value="03" maxlength="2" onblur="sync()">
            <span class="dots yellow">:</span>
            <input type="text" id="sec-in" class="t-input yellow" value="00" maxlength="2" onblur="sync()">
            <span id="sub" class="time-sub red">.00</span>
        </div>
        
        <div class="controls">
            <button class="btn-ctrl btn-start" onclick="start()">START</button>
            <button class="btn-ctrl btn-stop" onclick="stop()">STOP</button>
            <button class="btn-ctrl btn-gray" onclick="togglePreset()">3:00</button>
            <button class="btn-ctrl btn-gray" onclick="location.reload()">RESET</button>
            <button class="btn-ctrl btn-stop" onclick="openOverlay()">🕒</button>
        </div>
    </div>

    <div id="overlay">
        <div id="ov-time" style="font-family:'Share Tech Mono'; font-size:10rem; color:var(--yellow)">01:00</div>
        <div style="display:flex; gap:10px; width:90%; margin-top:20px">
            <button class="btn-ctrl btn-start" style="flex:1" onclick="startOV()">START</button>
            <button class="btn-ctrl btn-stop" style="flex:1" onclick="stopOV()">STOP</button>
            <button class="btn-ctrl btn-gray" style="flex:1" onclick="closeOverlay()">ĐÓNG</button>
        </div>
    </div>

<script>
    // Giữ nguyên logic xử lý của bạn
    let timeLeft = 180980, timerId = null, audioCtx = null, played15s = false;
    let ovTimeLeft = 60980, ovTimerId = null;

    function initAudio() { if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    function changeScore(id, val) { let el = document.getElementById(id); el.innerText = Math.max(0, parseInt(el.innerText) + val); }
    function toggleSenshu(side) {
        const t = document.getElementById('senshu' + side);
        const o = side === 'Aka' ? document.getElementById('senshuAo') : document.getElementById('senshuAka');
        t.classList.toggle('active'); if(t.classList.contains('active')) o.classList.remove('active');
    }
    function sync() {
        let m = parseInt(document.getElementById('min-in').value) || 0;
        let s = parseInt(document.getElementById('sec-in').value) || 0;
        timeLeft = (m * 60 + s) * 1000 + 980; updateUI();
    }
    function updateUI() {
        const minI = document.getElementById('min-in'), secI = document.getElementById('sec-in'), sub = document.getElementById('sub');
        if (timeLeft >= 16000) {
            let displaySec = Math.floor((timeLeft - 1) / 1000);
            minI.value = Math.floor(displaySec / 60).toString().padStart(2, '0');
            secI.value = (displaySec % 60).toString().padStart(2, '0');
            minI.className = secI.className = "t-input yellow"; sub.style.display = "none";
        } else {
            let s = Math.floor(timeLeft / 1000), ms = Math.floor((timeLeft % 1000) / 10);
            minI.value = "00"; secI.value = s.toString().padStart(2, '0');
            sub.innerText = "." + ms.toString().padStart(2, '0');
            minI.className = secI.className = "t-input red"; sub.style.display = "inline";
        }
    }
    function start() {
        if (timerId || timeLeft <= 0) return;
        initAudio(); let last = Date.now();
        timerId = setInterval(() => {
            let delta = Date.now() - last; last = Date.now();
            let old = timeLeft; timeLeft -= delta;
            if (old >= 16000 && timeLeft < 16000 && !played15s) { ring(1000); played15s = true; }
            if (timeLeft <= 0) { timeLeft = 0; stop(); updateUI(); ring(2000); } else updateUI();
        }, 20);
    }
    function stop() { clearInterval(timerId); timerId = null; }
    function ring(d) {
        if(!audioCtx) return;
        let o = audioCtx.createOscillator(); let g = audioCtx.createGain();
        o.type = 'square'; o.frequency.value = 450; o.connect(g); g.connect(audioCtx.destination);
        o.start(); setTimeout(() => o.stop(), d);
    }
    function openOverlay() { stop(); document.getElementById('overlay').style.display = 'flex'; ovTimeLeft = 60980; updateUIOV(); }
    function closeOverlay() { stopOV(); document.getElementById('overlay').style.display = 'none'; }
    function startOV() {
        if (ovTimerId || ovTimeLeft <= 0) return;
        initAudio(); let last = Date.now();
        ovTimerId = setInterval(() => {
            let delta = Date.now() - last; last = Date.now();
            ovTimeLeft -= delta; if (ovTimeLeft <= 0) { ovTimeLeft = 0; stopOV(); ring(2000); }
            updateUIOV();
        }, 20);
    }
    function stopOV() { clearInterval(ovTimerId); ovTimerId = null; }
    function updateUIOV() {
        let totalSec = Math.max(0, Math.floor((ovTimeLeft - 1) / 1000));
        let m = Math.floor(totalSec / 60).toString().padStart(2, '0'), s = (totalSec % 60).toString().padStart(2, '0');
        document.getElementById('ov-time').innerText = m + ":" + s;
    }
    // Chế độ preset đơn giản
    function togglePreset() {
        const presets = [180, 120, 60, 30];
        let currentS = Math.floor(timeLeft / 1000);
        let nextIdx = (presets.indexOf(currentS) + 1) % presets.length;
        timeLeft = (presets[nextIdx] * 1000) + 980;
        event.target.innerText = Math.floor(presets[nextIdx]/60) + ":" + (presets[nextIdx]%60 == 0 ? "00" : presets[nextIdx]%60);
        updateUI();
    }
</script>
</body>
</html>
